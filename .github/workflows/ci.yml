name: Daml CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-daml:
    name: Build and Test Daml Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM (Daml Package Manager)
        run: |
          curl -sSL https://get.digitalasset.com/install/install.sh | sh
        shell: bash

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Verify DPM installation
        run: dpm --version

      - name: Cache DPM packages
        uses: actions/cache@v4
        with:
          path: ~/.dpm/packages
          key: ${{ runner.os }}-dpm-${{ hashFiles('**/daml.yaml', 'multi-package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dpm-

      - name: Build Daml contracts
        run: dpm build

      - name: Run Daml tests
        run: dpm test